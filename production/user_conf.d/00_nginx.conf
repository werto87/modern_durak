map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# =========================
# MAIN WEBSITE
# =========================
server {
    listen 443 ssl default_server reuseport;
    listen [::]:443 ssl default_server reuseport;

    server_name modern-durak.com www.modern-durak.com;

    ssl_certificate         /etc/letsencrypt/live/modern-durak.com/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/modern-durak.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/modern-durak.com/chain.pem;

    ssl_dhparam /etc/letsencrypt/dhparams/dhparam.pem;

    client_max_body_size 100M;

    location / {
        root /client;
        index index.html;
    }

    location /wss {
        proxy_pass https://modern-durak.com:55555;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# =========================
# FORGEJO (Git + Registry)
# =========================
server {
    listen 80;
    listen [::]:80;

    server_name modern-durak.com www.modern-durak.com;

    return 301 https://$host$request_uri;
    
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name git.modern-durak.com;

    ssl_certificate         /etc/letsencrypt/live/modern-durak.com/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/modern-durak.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/modern-durak.com/chain.pem;

    ssl_dhparam /etc/letsencrypt/dhparams/dhparam.pem;

    client_max_body_size 512M;

    # -------------------------
    # Forgejo Web UI
    # -------------------------
    location / {
        proxy_pass http://forgejo:3000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_redirect off;
    }

    # -------------------------
    # Docker Registry
    # -------------------------
    location /v2/ {
        proxy_pass http://forgejo:3000/v2/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;

        proxy_request_buffering off;
    }

    # -------------------------
    # WebSockets (Actions)
    # -------------------------
    location /actions/ {
        proxy_pass http://forgejo:3000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }
}