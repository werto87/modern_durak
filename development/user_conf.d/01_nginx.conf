server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name git.modern-durak.com;

    ssl_certificate         /etc/letsencrypt/live/git.modern-durak.com/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/git.modern-durak.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/git.modern-durak.com/chain.pem;
    ssl_dhparam             /etc/letsencrypt/dhparams/dhparam.pem;

    client_max_body_size 512M;

    location / {
        proxy_pass         http://forgejo:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}